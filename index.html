  function checkTime() {
    const now = new Date();
    const hour = now.getHours();
    const min  = now.getMinutes();

    if (hour === 17 && min >= 1 && min <= 10) {
      location.reload();
    }
  }

  setInterval(checkTime, 15000); // 15秒ごと
